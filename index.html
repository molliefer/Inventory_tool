<!DOCTYPE html>
<html>
<head>
    <title>Inventory Tool Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h2>Inventory Planning Tool</h2>

<input type="file" id="fileInput" accept=".xlsx,.xls,.csv"><br><br>
<button onclick="runAnalysis()">Run Analysis</button>

<div id="output"></div>

<script>

let rawData = [];

// LOAD FILE
document.getElementById('fileInput').addEventListener('change', function(e) {

    let reader = new FileReader();
    let file = e.target.files[0];

    reader.onload = function(e) {

        let result = e.target.result;
        let workbook;

        if (file.name.endsWith(".csv")) {
            workbook = XLSX.read(result, {type: "string"});
        } else {
            let data = new Uint8Array(result);
            workbook = XLSX.read(data, {type: "array"});
        }

        let sheetName = workbook.SheetNames[0];
        rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

        alert("File loaded!");
    };

    file.name.endsWith(".csv") ? reader.readAsText(file) : reader.readAsArrayBuffer(file);
});

// MAIN FUNCTION
function runAnalysis() {

    if (!rawData || rawData.length === 0) {
        alert("Upload file first");
        return;
    }

    let columns = Object.keys(rawData[0]);

    let cleanColumns = columns.map((col, i) => {
        if (!col || typeof col !== "string") return "Product_" + (i+1);
        return col.replace(/\n/g, " ").trim() || "Product_" + (i+1);
    });

    let results = {};
    let lateStats = {};

    let lateCol = columns.find(c =>
        c.replace(/\s/g,"").toLowerCase().includes("late")
    );

    rawData.forEach(row => {

        let isLate = 0;

        if (lateCol) {
            let val = row[lateCol];

            if (typeof val === "string") {
                isLate = val.toLowerCase().includes("late") ? 1 : 0;
            } else {
                let num = Number(val);
                if (!isNaN(num)) isLate = (num === 0) ? 1 : 0;
            }
        }

        columns.forEach((col, idx) => {

            let name = col.toLowerCase();

            if (
                name.includes("order") ||
                name.includes("date") ||
                name.includes("status") ||
                name.includes("customer") ||
                name.includes("unit") ||
                name.includes("flag") ||
                name.includes("derived")
            ) return;

            let raw = row[col];

            if (raw === undefined || raw === null || raw === "") return;

            let val = parseFloat(
                String(raw)
                    .replace(/,/g, "")
                    .replace(/\n/g, "")
                    .trim()
            );

            if (!isNaN(val)) {

                let product = cleanColumns[idx];

                if (!results[product]) {
                    results[product] = [];
                    lateStats[product] = [];
                }

                // include zero demand
                results[product].push(val);

                // only count late when product ordered
                if (val > 0) {
                    lateStats[product].push(isLate);
                }
            }
        });
    });

    if (Object.keys(results).length === 0) {
        document.getElementById("output").innerHTML =
            "<p>No product data detected.</p>";
        return;
    }

    // ===== MAIN TABLE =====
    let html = "<h3>Demand & Inventory Analysis</h3>";
    html += "<table border='1'><tr><th>Product</th><th>Mean</th><th>Std Dev</th><th>Safety Stock</th><th>Reorder Point</th><th>Replenishment Qty</th><th>Late %</th></tr>";

    Object.keys(results).forEach(product => {

        let arr = results[product];
        let arrNonZero = arr.filter(v => v > 0);

        let n = arr.length;
        let mean = arr.reduce((a,b)=>a+b,0)/n;

        // STDEV.S on NON-ZERO VALUES
        let std = 0;

        if (arrNonZero.length > 1) {
            let meanNZ = arrNonZero.reduce((a,b)=>a+b,0)/arrNonZero.length;

            let variance = arrNonZero.reduce((a,b)=>
                a + Math.pow(b - meanNZ,2),0) / (arrNonZero.length - 1);

            std = Math.sqrt(variance);
        }

        let lateArr = lateStats[product];

        let lateRate = lateArr.length > 0
            ? lateArr.reduce((a,b)=>a+b,0)/lateArr.length
            : 0;

        let leadTime = 2;
        let z = 1.65;

        let safetyStock = z * std * Math.sqrt(leadTime);
        let reorderPoint = mean * leadTime + safetyStock;
        let replenishmentQty = mean * leadTime;

        html += `<tr>
            <td>${product}</td>
            <td>${mean.toFixed(2)}</td>
            <td>${std.toFixed(2)}</td>
            <td>${safetyStock.toFixed(2)}</td>
            <td>${reorderPoint.toFixed(2)}</td>
            <td>${replenishmentQty.toFixed(2)}</td>
            <td>${(lateRate*100).toFixed(1)}%</td>
        </tr>`;
    });

    html += "</table>";
    document.getElementById("output").innerHTML = html;

    // ===== CORRELATION =====
    let products = Object.keys(results);

    function correlation(x, y) {
        let n = Math.min(x.length, y.length);

        let avgX = x.reduce((a,b)=>a+b,0)/n;
        let avgY = y.reduce((a,b)=>a+b,0)/n;

        let num = 0, dx = 0, dy = 0;

        for (let i = 0; i < n; i++) {
            num += (x[i]-avgX)*(y[i]-avgY);
            dx += Math.pow(x[i]-avgX,2);
            dy += Math.pow(y[i]-avgY,2);
        }

        let result = num / Math.sqrt(dx * dy);
        return isFinite(result) ? result : 0;
    }

    let corrHTML = "<h3>Correlation Matrix</h3>";
    corrHTML += "<table border='1'><tr><th></th>";

    products.forEach(p => corrHTML += `<th>${p}</th>`);
    corrHTML += "</tr>";

    products.forEach(p1 => {
        corrHTML += `<tr><td>${p1}</td>`;

        products.forEach(p2 => {
            let val = correlation(results[p1], results[p2]);
            corrHTML += `<td>${val.toFixed(2)}</td>`;
        });

        corrHTML += "</tr>";
    });

    corrHTML += "</table>";
    document.getElementById("output").innerHTML += corrHTML;

    // ===== SERVICE LEVEL =====
    let serviceHTML = "<h3>Service Level Diagnostics</h3>";
    serviceHTML += "<table border='1'><tr><th>Product</th><th>Late %</th><th>Service Level %</th><th>Diagnosis</th></tr>";

    Object.keys(results).forEach(product => {

        let lateArr = lateStats[product];

        let lateRate = lateArr.length > 0
            ? lateArr.reduce((a,b)=>a+b,0)/lateArr.length
            : 0;

        let serviceLevel = 1 - lateRate;

        let diagnosis = lateRate > 0.3 ? "High stockout risk"
                      : lateRate > 0.15 ? "Moderate issues"
                      : "Stable";

        serviceHTML += `<tr>
            <td>${product}</td>
            <td>${(lateRate*100).toFixed(1)}%</td>
            <td>${(serviceLevel*100).toFixed(1)}%</td>
            <td>${diagnosis}</td>
        </tr>`;
    });

    serviceHTML += "</table>";
    document.getElementById("output").innerHTML += serviceHTML;
}

</script>

</body>
</html>
